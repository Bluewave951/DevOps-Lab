name: DevOps CI

on:
  push:
    branches: [ main ]

jobs:
 build:
  runs-on: ubuntu-latest

  steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Image
      run: docker build -t heropb/devops-lab:v1 .

    - name: Push Image
      run: docker push heropb/devops-lab:v1